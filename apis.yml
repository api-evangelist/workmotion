aid: workmotion
url: https://raw.githubusercontent.com/api-evangelist/workmotion/refs/heads/main/apis.yml
name: WorkMotion
kind: company
description: WorkMotion is a global employment and Employer of Record (EOR) platform
  that lets companies compliantly hire, onboard, and pay international employees and
  contractors across 160+ countries. Its partner/Open API surfaces employee and
  contract data, onboarding workflows, absences and time-off, documents, employment
  cost calculations, and webhooks so HRIS and payroll systems can integrate with
  WorkMotion's managed employment infrastructure.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Employer of Record
- EOR
- Global Employment
- HR
- Payroll
- Onboarding
- Contractors
- Compliance
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
