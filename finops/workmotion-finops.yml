provider: WorkMotion
providerId: workmotion
created: '2026-07-01'
modified: '2026-07-01'
reconciled: true
tags:
- Employer of Record
- EOR
- Global Employment
- HR
- Payroll
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of WorkMotion spend. WorkMotion bills a recurring per-talent or
  per-contractor subscription (EOR, Direct Hiring, Contractor Management)
  rather than per-API-call usage. Total cost of employment for each talent
  also includes the employee's gross salary plus country-specific employer
  taxes, contributions, and benefits, which WorkMotion's cost calculator makes
  visible before hiring. The partner / Open API is provisioned with the
  platform and is not separately metered.
notes: >-
  Per-talent list prices are subject to change and are sales-quoted; salary,
  tax, and contribution amounts are country-specific. Verify against the
  WorkMotion pricing page and cost calculator during reconciliation.
sources:
- https://workmotion.com/pricing/
- https://workmotion.com/tools/employment-cost-calculator/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: WorkMotion
serviceCategory: Human Resources
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: WorkMotion Global Employment Platform
  ServiceCategory: Human Resources
  ProviderName: WorkMotion
  PublisherName: WorkMotion
  InvoiceIssuerName: WorkMotion
  BillingCurrency: EUR
  ChargeCategory: Usage
  PricingCategory: Subscription
meters:
- name: eor_talents
  description: Active EOR talents billed per talent per month.
  unit: talents
  aggregation: sum
  dimensions:
  - account
  - country
- name: direct_talents
  description: Active Direct Hiring talents billed per talent per month.
  unit: talents
  aggregation: sum
  dimensions:
  - account
  - country
- name: contractors
  description: Managed contractors billed per contractor per month.
  unit: contractors
  aggregation: sum
  dimensions:
  - account
  - country
- name: employment_cost
  description: >-
    Fully-loaded cost of employment per talent (gross salary plus employer
    taxes, contributions, and benefits) surfaced by the cost calculator.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - country
  - employee
principles:
- name: Visibility
  description: Use the cost calculator to see the total loaded cost per country before hiring; reconcile monthly per-talent invoices per team.
- name: Allocation
  description: Tag talents and contractors to teams / cost centers by country of employment and employment type.
- name: Optimization
  description: Match employment type to need - Contractor Management for short-term work, Direct Hiring for long-term country presence, EOR for fast compliant hiring - and consolidate countries to reduce overhead.
- name: Accountability
  description: Assign an owner per hiring country / team and review headcount and loaded cost against budget each month.
maintainers:
